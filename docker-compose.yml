version: '3.8'

services:
  # Наш бот
  sanskrit_bot:
    build: .
    container_name: sanskrit_bot_app
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app  # Позволяет видеть изменения кода без пересборки (для разработки)
    networks:
      - bot_network

  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: sanskrit_feedback_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-feedback_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-feedback_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  postgres_data: